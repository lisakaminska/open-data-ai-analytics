#cloud-config
package_update: true
package_upgrade: false

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - git

write_files:
  - path: /tmp/application.yaml
    content: |
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: mvc-analytics
        namespace: argocd
      spec:
        project: default
        source:
          repoURL: https://github.com/lisakaminska/open-data-ai-analytics
          targetRevision: main
          path: gitops/app
        destination:
          server: https://kubernetes.default.svc
          namespace: mvc-analytics
        syncPolicy:
          automated:
            prune: true
            selfHeal: true

runcmd:
  - curl -sfL https://get.k3s.io | sh -
  - systemctl enable k3s
  - systemctl start k3s
  - until kubectl get nodes 2>/dev/null | grep -q Ready; do sleep 5; done
  - kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
  - kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  - until kubectl get pods -n argocd 2>/dev/null | grep argocd-server | grep -q Running; do sleep 10; done
  - kubectl patch svc argocd-server -n argocd -p '{"spec":{"type":"NodePort","ports":[{"port":443,"targetPort":8080,"nodePort":30080,"name":"https"}]}}'
  - kubectl apply -f /tmp/application.yaml
