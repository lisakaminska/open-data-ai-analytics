name: CI Modules Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      module:
        description: "Select module"
        required: true
        default: "all"
        type: choice
        options: [all, data_load, data_quality, data_research, visualization]

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [data_load, data_quality, data_research, visualization]
    
    # Спрощена умова запуску
    if: |
      github.event_name != 'workflow_dispatch' || 
      github.event.inputs.module == 'all' || 
      github.event.inputs.module == matrix.module

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Module
        run: |
          mkdir -p artifacts/${{ matrix.module }}
          # Якщо твої файли НЕ в папці src, прибери "src/" нижче
          python src/${{ matrix.module }}.py > artifacts/${{ matrix.module }}/run.log 2>&1 || echo "Module failed"

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.module }}
          path: artifacts/${{ matrix.module }}/