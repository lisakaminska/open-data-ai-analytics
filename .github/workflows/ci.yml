name: CI Modules Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      module:
        description: "Select module"
        required: true
        default: "all"
        type: choice
        options: [all, data_load, data_quality, data_research, visualization]

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [data_load, data_quality, data_research, visualization]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Перевіряємо умову запуску всередині кроку
      - name: Should run?
        id: check_run
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]] || \
             [[ "${{ github.event.inputs.module }}" == "all" ]] || \
             [[ "${{ github.event.inputs.module }}" == "${{ matrix.module }}" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check_run.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.check_run.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Module
        if: steps.check_run.outputs.run == 'true'
        run: |
          mkdir -p artifacts/${{ matrix.module }}
          # Запускаємо файл
          python src/${{ matrix.module }}.py > artifacts/${{ matrix.module }}/run.log 2>&1 || echo "Module execution issue"

      - name: Upload Results
        if: always() && steps.check_run.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.module }}
          path: artifacts/${{ matrix.module }}/