name: mvc-analytics

networks:
  analytics-net:
    driver: bridge

volumes:
  db-data:
  reports-data:
  plots-data:
  prometheus-data:
  grafana-data:

services:

  data_load:
    build: ./data_load
    container_name: mvc_data_load
    environment:
      - CSV_PATH=/data/dataset.csv
      - DB_PATH=/db/analytics.db
    volumes:
      - ./data:/data:ro
      - db-data:/db
    networks:
      - analytics-net
    restart: "no"

  data_quality_analysis:
    build: ./data_quality_analysis
    container_name: mvc_data_quality
    environment:
      - DB_PATH=/db/analytics.db
      - REPORTS_PATH=/reports
    volumes:
      - db-data:/db
      - reports-data:/reports
    networks:
      - analytics-net
    depends_on:
      - data_load
    restart: "no"

  data_research:
    build: ./data_research
    container_name: mvc_data_research
    environment:
      - DB_PATH=/db/analytics.db
      - REPORTS_PATH=/reports
    volumes:
      - db-data:/db
      - reports-data:/reports
    networks:
      - analytics-net
    depends_on:
      - data_load
    restart: "no"

  visualization:
    build: ./visualization
    container_name: mvc_visualization
    environment:
      - DB_PATH=/db/analytics.db
      - PLOTS_PATH=/plots
    volumes:
      - db-data:/db
      - plots-data:/plots
    networks:
      - analytics-net
    depends_on:
      - data_load
    restart: "no"

  web:
    build: ./web
    container_name: mvc_web
    environment:
      - DB_PATH=/db/analytics.db
      - PLOTS_PATH=/plots
    volumes:
      - db-data:/db
      - plots-data:/plots
      - reports-data:/reports
    networks:
      - analytics-net
    ports:
      - "5000:5000"
    depends_on:
      - data_load
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - analytics-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - analytics-net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - analytics-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - analytics-net
