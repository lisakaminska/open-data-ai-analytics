{% extends "base.html" %}
{% block content %}
<div class="card">
    <h1>Візуалізації</h1>

    {% if not plots %}
    <div class="alert alert-warn">
        Графіки ще не згенеровані. Дочекайтесь завершення сервісу <code>visualization</code>.
    </div>
    {% else %}
    <p style="color:#555; margin-bottom:20px;">Згенеровано {{ plots|length }} графік(ів):</p>
    {% for plot in plots %}
    <div class="card" style="padding:16px;">
        <h2>{{ plot }}</h2>
        <img class="plot" src="/plots/{{ plot }}" alt="{{ plot }}">
    </div>
    {% endfor %}
    {% endif %}
</div>
{% endblock %}
